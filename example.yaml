# Example ESPHome config for the Dimplex Opti-Myst external component.
#
# Dimplex Penngrove/PNN20 units only pair with a single Bluetooth remote at a time.
# However, by configuring the ESP32 to use the same base MAC address as the
# original Dimplex controller, both the physical remote and the ESP32 can
# control the heater simultaneously.
#
# The remote's Bluetooth MAC address can be discovered by scanning for its
# advertisements using an application such as nRF Connect.
#
# ESPHome's `set_mac_address()` sets the ESP32's base MAC address, from which
# the Bluetooth MAC is automatically derived.  On the ESP32 used during testing,
# the Bluetooth interface uses a MAC address that is two higher than the base
# address.
#
# Example:
#   Physical remote Bluetooth MAC: 04:91:62:1F:22:12
#   ESPHome base MAC to configure: 04:91:62:1F:22:10
#
# This results in the ESP32 Bluetooth interface advertising as
# 04:91:62:1F:22:12, matching the original remote.
# See README.md for the protocol and the pairing procedure.

external_components:
  - source: github://Adam1986/esphome-dimplex-optimyst-alternative@main
    components: [dimplex_optimyst]
    # For local development, point at a checkout instead:
    #   - source:
    #       type: local
    #       path: components

esphome:
  name: dimplex-fireplace
  friendly_name: "Dimplex Fireplace"
  on_boot:
    priority: 1100
    then:
      - lambda: |-
          uint8_t custom_mac[6] = {0xXX, 0xXX, 0xXX, 0xXX, 0xXX, 0xXX}; # Enter MAC Address here after each 0x section
          
          // Use ESPHome's helper (no manual include needed)
          esphome::set_mac_address(custom_mac);
          
          ESP_LOGI("custom_mac", "✅ Set base MAC address to XX:XX:XX:XX:XX:XX"); # Enter MAC Address here for reference.

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

api:
# Uncomment + set an encryption key to expose to Home Assistant.
#  encryption:
#    key: !secret api_key

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

web_server:
  port: 80
  version: 3

esp32_ble:
  io_capability: none

dimplex_optimyst:
  - id: cassette

button:
  - platform: dimplex_optimyst
    dimplex_id: cassette
    name: "Power"
    cmd: POWER

  - platform: dimplex_optimyst
    dimplex_id: cassette
    name: "Heater Fan Mode"
    cmd: FAN_SPEED

  - platform: dimplex_optimyst
    dimplex_id: cassette
    name: "Temperature Up"
    cmd: TEMP_UP

  - platform: dimplex_optimyst
    dimplex_id: cassette
    name: "Temperature Down"
    cmd: TEMP_DOWN

  - platform: dimplex_optimyst
    dimplex_id: cassette
    name: "Mist Up"
    cmd: MIST_UP

  - platform: dimplex_optimyst
    dimplex_id: cassette
    name: "Mist Down"
    cmd: MIST_DOWN

  # Press the cassette's Bluetooth-icon button, then press this within 20s.
  # Broadcasts the Sound command for 25s, covering the sync window.
  - platform: dimplex_optimyst
    dimplex_id: cassette
    name: "Pair to Opti-Myst Fire"
    cmd: FAN_SPEED
    duration: 8s
